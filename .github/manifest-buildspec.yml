---
version: 0.2

env:
  shell: bash

phases:
  pre_build:
    commands:
      - COMMIT_HASH=$(git rev-parse --short=7 HEAD || echo "latest")
      - >-
        VERSION_TAG=$(git tag --points-at HEAD | sed '/-/!s/$/_/' | sort -rV |
        sed 's/_$//' | head -n 1 | grep ^ || git show -s --pretty=%D | sed 's/, /\n/g' |
        grep -v '^origin/' |grep -v '^grafted\|HEAD\|master\|main$' || echo "dev")
      - NITRO_VERSION=${VERSION_TAG}-${COMMIT_HASH}
      - IMAGE_TAG=${NITRO_VERSION}

      # Log IMAGE_TAG environment variable
      - echo "Using IMAGE_TAG environment variable $IMAGE_TAG"

      # Login to ECR
      - >-
        aws ecr get-login-password --region $AWS_DEFAULT_REGION |
        docker login --username AWS --password-stdin $REPOSITORY_URI
      # Login to DockerHub if credentials provided
      - |
        if [ -n "$DOCKERHUB_USERNAME" ] && [ -n "$DOCKERHUB_PASSWORD" ]; then
          echo "$DOCKERHUB_PASSWORD" | docker login --username "$DOCKERHUB_USERNAME" --password-stdin
        fi

  build:
    commands:
      - |
        set -euo pipefail
        # ECR is immutable: reruns must skip when the remote list already
        # aggregates current per-arch digests. The classifier below exists so
        # auth/network/5xx don't get treated as tag-missing.
        commit="${CODEBUILD_RESOLVED_SOURCE_VERSION:-unknown}"
        imagetools_create_or_skip_existing() {
          local ref="$1"; shift
          local inspect_out remote_amd64 remote_arm64 current_amd64 current_arm64
          echo "=== $ref ==="
          if inspect_out=$(docker buildx imagetools inspect "$ref" --raw 2>&1); then
            remote_amd64=$(printf '%s' "$inspect_out" | jq -r '.manifests[]? | select(.platform.architecture=="amd64") | .digest')
            remote_arm64=$(printf '%s' "$inspect_out" | jq -r '.manifests[]? | select(.platform.architecture=="arm64") | .digest')
            current_amd64=$(docker buildx imagetools inspect "$1" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            current_arm64=$(docker buildx imagetools inspect "$2" --format '{{.Manifest.Digest}}' 2>/dev/null || true)
            if [ -n "$remote_amd64" ] && [ -n "$remote_arm64" ] && \
               [ "$remote_amd64" = "$current_amd64" ] && [ "$remote_arm64" = "$current_arm64" ]; then
              echo "INFO: $ref already aggregates current per-arch digests (commit $commit); skipping."
              return 0
            fi
            echo "ERROR: $ref exists but children diverge from current per-arch tags (remote amd64=$remote_amd64 arm64=$remote_arm64; current amd64=$current_amd64 arm64=$current_arm64; commit $commit)" >&2
            return 1
          fi
          case "$inspect_out" in
            *"manifest unknown"*|*"MANIFEST_UNKNOWN"*|*"no such manifest"*|*"not found"*)
              echo "creating $ref"
              docker buildx imagetools create -t "$ref" "$@"
              ;;
            *)
              echo "ERROR: inspect for $ref failed: $inspect_out" >&2
              return 1
              ;;
          esac
        }

        push_variant() {
          local suffix="$1"
          local ref="$REPOSITORY_URI:$IMAGE_TAG${suffix}"
          imagetools_create_or_skip_existing "$ref" "${ref}-amd64" "${ref}-arm64"
        }

        push_variant ""
        push_variant "-slim"
        push_variant "-dev"
        push_variant "-validator"
        push_variant "-stripped"
        push_variant "-slim-stripped"
