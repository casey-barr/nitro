---
name: Nitro CI Setup
description: Common setup for Nitro CI jobs

runs:
  using: composite

  steps:
    - name: Install dependencies
      run: sudo apt update && sudo apt install -y wabt gotestsum
      shell: bash

    - name: Setup Node.js
      uses: actions/setup-node@v6
      with:
        node-version: "24"
        cache: yarn
        cache-dependency-path: "**/yarn.lock"

    - name: Setup Go
      uses: actions/setup-go@v6
      with:
        go-version-file: "go.mod"
        # The Go caches are managed by the explicit cache steps below.
        cache: false

    - name: Install wasm-ld
      run: |
        sudo apt-get update && sudo apt-get install -y lld-14
        sudo ln -s /usr/bin/wasm-ld-14 /usr/local/bin/wasm-ld
      shell: bash

    - name: Install rust
      id: install-rust
      uses: ./.github/actions/install-rust

    - name: Setup Foundry
      uses: foundry-rs/foundry-toolchain@8789b3e21e6c11b2697f5eb56eddae542f746c10  # v1
      with:
        cache: false
        version: v1.0.0

    - name: Install cbindgen
      uses: taiki-e/install-action@0abfcd587b70a713fdaa7fb502c885e2112acb15  # v2
      with:
        tool: cbindgen@0.29

    - name: Cache Go build
      uses: actions/cache@v5
      with:
        path: ~/.cache/go-build
        # github.sha prevents exact-key hits, which would skip the save and
        # let the cache go stale.
        key: ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-${{ github.sha }}
        # Stale restores are safe: the build cache is content-addressed.
        restore-keys: |
          ${{ runner.os }}-go-${{ hashFiles('**/go.sum') }}-
          ${{ runner.os }}-go-

    - name: Cache Go modules
      uses: actions/cache@v5
      with:
        path: ~/go/pkg/mod
        # The module cache is determined by go.sum, so an exact key suffices.
        key: ${{ runner.os }}-go-mod-${{ hashFiles('**/go.sum') }}
        restore-keys: ${{ runner.os }}-go-mod-

    # Crate sources are immutable, so stale restores are safe.
    - name: Cache Cargo registry
      uses: actions/cache@v5
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
        key: ${{ runner.os }}-cargo-registry-${{ hashFiles('Cargo.lock') }}
        restore-keys: ${{ runner.os }}-cargo-registry-

    - name: Cache cbrotli
      id: cache-cbrotli
      uses: actions/cache@v5
      with:
        path: |
          target/include/brotli/
          target/lib-wasm/
          target/lib/libbrotlicommon-static.a
          target/lib/libbrotlienc-static.a
          target/lib/libbrotlidec-static.a
        key: ${{ runner.os }}-brotli-${{ hashFiles('scripts/build-brotli.sh') }}

    - name: Build cbrotli-local
      if: steps.cache-cbrotli.outputs.cache-hit != 'true'
      run: ./scripts/build-brotli.sh -l
      shell: bash

    - name: Build cbrotli-wasm in docker
      if: steps.cache-cbrotli.outputs.cache-hit != 'true'
      run: ./scripts/build-brotli.sh -w -d
      shell: bash
