---
name: Docker build CI
run-name: Docker build CI triggered from @${{ github.actor }} of ${{ github.head_ref }}

concurrency:
  group: ${{ github.workflow }}-${{ github.head_ref || github.run_id }}-${{ github.ref }}
  cancel-in-progress: true

on:
  workflow_dispatch:
  merge_group:
  pull_request:
    types: [opened, synchronize, reopened]

permissions:
  contents: read

jobs:
  # Detect whether anything other than the changelog changed. code_changed is
  # "any file other than CHANGELOG.md or changelog/**", so a changelog-only PR
  # leaves it false and skips the build below.
  changes:
    uses: ./.github/workflows/_detect-changes.yml
    secrets: inherit

  docker:
    name: Docker build
    runs-on: arbitrator-ci
    needs: changes
    # Skip the build for changelog-only PRs. merge_group and manual runs always
    # build, since detect-changes has no PR diff base for those events.
    if: github.event_name != 'pull_request' || needs.changes.outputs.code_changed == 'true'

    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          token: ${{ secrets.PRIVATE_REPO_PAT || github.token }}

      - id: submods
        uses: ./.github/actions/init-submodules
        with:
          client-id: ${{ vars.NITRO_CI_APP_CLIENT_ID }}
          app-private-key: ${{ secrets.NITRO_CI_APP_PRIVATE_KEY }}
          pat: ${{ secrets.PRIVATE_REPO_PAT }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3

      - name: Build nitro-node-dev docker
        uses: docker/build-push-action@10e90e3645eae34f1e60eeb005ba3a3d33f178e8  # v6
        with:
          target: nitro-node-dev
          load: true
          context: .
          tags: nitro-node-dev:latest
          secrets: |
            gh_token=${{ steps.submods.outputs.token }}

      - name: Start background nitro-testnode
        shell: bash
        run: |
          # Reuse the image we just built instead of rebuilding inside test-node.bash
          docker image inspect nitro-node-dev:latest --format '{{.Id}} {{.Architecture}}'
          cd nitro-testnode
          ./test-node.bash --init --dev --no-build-dev-nitro > /tmp/testnode.log 2>&1 &
          echo "$!" > /tmp/testnode.pid

      - name: Wait for rpc to come up
        shell: bash
        run: ${{ github.workspace }}/.github/workflows/waitForNitro.sh

      - name: Dump testnode logs
        if: always()
        shell: bash
        run: |
          if [ -f /tmp/testnode.log ]; then
            echo "=== Last 200 lines of testnode.log ==="
            tail -200 /tmp/testnode.log
          fi

      - name: Print WAVM module root
        id: module-root
        shell: bash
        run: |
          # Unfortunately, `docker cp` seems to always result in a "permission denied"
          # We work around this by piping a tarball through stdout
          docker run --rm --entrypoint tar nitro-node-dev:latest -cf - target/machines/latest | tar xf -
          module_root="$(cat "target/machines/latest/module-root.txt")"
          echo "module-root=$module_root" >> "$GITHUB_OUTPUT"
          echo -e "\x1b[1;34mWAVM module root:\x1b[0m $module_root"

      - name: Upload WAVM machine as artifact
        uses: actions/upload-artifact@v6
        with:
          name: wavm-machine-${{ steps.module-root.outputs.module-root }}
          path: target/machines/latest/*
          if-no-files-found: error

