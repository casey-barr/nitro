---
name: Merge CI
run-name: Merge CI triggered from @${{ github.actor }} of ${{ github.head_ref }}

on:
  merge_group:

jobs:
  # --- Determine which files have changed ---
  changes:
    uses: ./.github/workflows/_detect-changes.yml
    secrets: inherit

  # --- Fast: Build + Lint only ---
  fast:
    uses: ./.github/workflows/_fast.yml
    secrets: inherit

  # --- Run Rust tests ---
  rust-tests:
    needs: changes
    if: needs.changes.outputs.rust_changed == 'true'
    uses: ./.github/workflows/_rust-tests.yml
    secrets: inherit

  # --- Run Bold Legacy challenge tests ---
  bold-legacy:
    needs: changes
    if: needs.changes.outputs.bold_legacy_changed == 'true'
    uses: ./.github/workflows/_bold-legacy.yml
    secrets: inherit

  # --- Skip the Go suite if this exact tree already passed PR CI ---
  tested-tree:
    runs-on: ubuntu-4
    permissions:
      contents: read
      actions: read
    outputs:
      already-tested: ${{ steps.check.outputs.already-tested }}
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Look up tree marker
        id: check
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO_ID: ${{ github.repository_id }}
        run: |
          tree=$(git rev-parse 'HEAD^{tree}')
          # A fork PR run can upload an artifact of any name, so the marker's
          # existence alone does not prove this repo's CI ran the suite. Only
          # count markers from runs whose head repo is this repo (head_repository_id
          # differs for fork runs), which fork-controlled workflows cannot forge.
          count=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=go-tests-passed-tree-${tree}&per_page=100" \
            | jq --argjson repo "$REPO_ID" '[.artifacts[] | select(.workflow_run.head_repository_id == $repo)] | length')
          echo "Found ${count} trusted marker artifact(s) for tree ${tree}"
          if [ "$count" -gt 0 ]; then
            echo "already-tested=true" >> "$GITHUB_OUTPUT"
          else
            echo "already-tested=false" >> "$GITHUB_OUTPUT"
          fi

  # --- Full GO tests ---
  go-tests:
    needs: [changes, tested-tree]
    # !cancelled() so a failed marker lookup falls back to running the suite
    if: ${{ !cancelled() && needs.changes.outputs.code_changed == 'true' && needs.tested-tree.outputs.already-tested != 'true' }}
    uses: ./.github/workflows/_standard-go-test-suite.yml
    secrets: inherit

  # --- Summarize test results ---
  codecov:
    needs: [go-tests, rust-tests]
    if: '!cancelled() && (needs.go-tests.result != ''skipped'' || needs.rust-tests.result != ''skipped'')'
    uses: ./.github/workflows/_codecov.yml
    secrets: inherit
    permissions:
      contents: read
      pull-requests: write
    with:
      post_comment: false
      upload_report: true

  can_proceed:
    runs-on: ubuntu-4
    needs: [changes, fast, rust-tests, bold-legacy, go-tests, tested-tree]
    if: always()
    steps:
      - name: Aggregate results
        run: |
          fast_result="${{ needs.fast.result }}"
          go_tests_result="${{ needs['go-tests'].result }}"
          rust_tests_result="${{ needs['rust-tests'].result }}"
          bold_legacy_result="${{ needs['bold-legacy'].result }}"
          already_tested="${{ needs['tested-tree'].outputs.already-tested }}"
          code_changed="${{ needs.changes.outputs.code_changed }}"
          ok=1
          if [ "$fast_result" != "success" ]; then
            ok=0
            echo "Fast job failed or was skipped"
          fi
          if [ "$go_tests_result" == "skipped" ] && { [ "$already_tested" == "true" ] || [ "$code_changed" != "true" ]; }; then
            echo "Go tests skipped: tree already passed PR CI or no code changed"
          elif [ "$go_tests_result" != "success" ]; then
            ok=0
            echo "Go tests job failed or was skipped"
          fi
          if [ "$rust_tests_result" != "success" ] && [ "$rust_tests_result" != "skipped" ]; then
            ok=0
            echo "Rust job failed"
          fi
          if [ "$bold_legacy_result" != "success" ] && [ "$bold_legacy_result" != "skipped" ]; then
            ok=0
            echo "Bold Legacy job failed"
          fi
          if [ $ok -eq 1 ]; then
            echo "All required jobs passed or were skipped"
            exit 0
          else
            echo "One or more required jobs failed"
            exit 1
          fi

  can_see_status:
    # This job is just to make sure that the "can_proceed" job's status is visible
    # on the pull request page, even if it is skipped due to all its dependencies being
    # skipped. It does not depend on any other jobs, so it always runs.
    runs-on: ubuntu-4
    steps:
      - run: true
